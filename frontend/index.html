<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>易悉EACY数据平台</title>
  <meta name="description" content="曦栋易悉EACY数据平台 - 专业的临床研究数据管理系统" />
  <meta name="keywords" content="CRF,临床研究,数据管理,医疗信息化,AI数据抽取" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  
  <!-- Ant Design Icons (移除外部字体预加载以避免控制台网络错误) -->
  
  <!-- 预加载关键资源 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <style>
    /* 初始加载样式 */
    #root {
      min-height: 100vh;
      background: #f5f5f5;
    }
    
    /* 加载状态样式 */
    #root.loading {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .loading-container {
      text-align: center;
      color: #1677ff;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f0f0f0;
      border-top: 3px solid #1677ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* 全局重置样式 */
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5715;
      color: rgba(0, 0, 0, 0.88);
      background-color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* 医疗数据界面特殊样式 */
    .data-completeness-high { color: #52c41a; }
    .data-completeness-medium { color: #faad14; }
    .data-completeness-low { color: #ff4d4f; }
    
    .confidence-high { background-color: #f6ffed; border-color: #b7eb8f; }
    .confidence-medium { background-color: #fffbe6; border-color: #ffe58f; }
    .confidence-low { background-color: #fff2f0; border-color: #ffccc7; }
  </style>
</head>
<body>
  <div id="root" class="loading">
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <div>曦栋智能CRF数据平台加载中...</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
  
  <script>
    // 应用加载完成后移除loading类
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('root').classList.remove('loading');
      }, 100);
    });
  </script>
</body>
</html>
