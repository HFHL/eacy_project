# EACY Frontend Nginx Configuration
# 用于生产环境的 SPA 路由和 API 代理

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker 内置 DNS（可选）
    resolver 127.0.0.11 valid=30s ipv6=off;

    # 日志格式
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # 性能优化
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/rss+xml application/atom+xml image/svg+xml;

    # 上传文件大小限制
    client_max_body_size 100M;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Test Agent API 代理 - 转发到测试服务 (/api/test/...)
        location /api/test/ {
            # 使用变量延迟 DNS 解析
            set $agent_host "agent";
            set $agent_port "8001";
            resolver 127.0.0.11 valid=30s;
            proxy_pass http://$agent_host:$agent_port;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置（Agent 处理可能较慢）
            proxy_connect_timeout 120s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # 上传文件大小
            client_max_body_size 100M;
        }

        # Debug API 代理 - 转发到测试服务 (/debug/...)
        # 注意：前端 React SPA 页面本身也使用 /debug/extraction 路由。
        # 为避免被下面的 /debug/ 代理劫持，这里显式让 /debug/extraction 走 SPA（返回 index.html）。
        location ^~ /debug/extraction {
            try_files $uri $uri/ /index.html;
        }

        location /debug/ {
            # 使用变量延迟 DNS 解析
            set $agent_host "agent";
            set $agent_port "8001";
            resolver 127.0.0.11 valid=30s;
            proxy_pass http://$agent_host:$agent_port/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 120s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # 上传文件大小
            client_max_body_size 100M;
        }

        # API 代理 - 转发到后端服务
        location /api/ {
            # 使用变量延迟 DNS 解析
            set $backend_host "backend";
            set $backend_port "8000";
            resolver 127.0.0.11 valid=30s;
            # 注意：proxy_pass 使用变量时不要拼接 URI，否则可能丢失原始路径（导致后端收到 /api/ 之类的错误路径）
            proxy_pass http://$backend_host:$backend_port;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 超时设置
            # AI 抽取/解析可能较慢（前端 axios 超时为 120s），这里设置更长避免 504
            proxy_connect_timeout 120s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # 缓冲设置
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # WebSocket 专用代理
        location /ws/ {
            # 使用变量延迟 DNS 解析
            set $backend_host "backend";
            set $backend_port "8000";
            resolver 127.0.0.11 valid=30s;
            proxy_pass http://$backend_host:$backend_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # SPA 路由 - 所有未匹配的请求返回 index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}

